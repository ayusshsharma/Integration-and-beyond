title: Ayush Integration Lab
description: Real-world notes on API Connect, Kong Gateway, middleware, and integration experiments.
author: Ayush
email: hello@example.com

url: "https://ayusshsharma.github.io"
baseurl: "/Integration-and-beyond"

github_username: ayusshsharma
repository: Integration-and-beyond
linkedin_username: ayusshsharma

markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/
excerpt_separator: "<!--more-->"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page

category_names:
  - IBM API Connect
  - Kong Gateway
  - Middleware & Integration
  - POS Modernization
  - n8n Automation
  - Tech Experiments / POCs

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - wordpress-theme
  - .git
  - .gitignore
