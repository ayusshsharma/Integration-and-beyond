title: Integration & Beyond by Ayush
description: Real-world notes on API Connect, Kong Gateway, middleware, and integration experiments.
author: Ayush Sharma
email: ayusshsharma@outlook.com

url: "https://ayusshsharma.github.io"
baseurl: "/Integration-and-beyond"

linkedin_username: ayusshsharma

markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/
excerpt_separator: "<!--more-->"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page

category_names:
  - IBM API Connect

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - wordpress-theme
  - README.md
  - .git
  - .gitignore
  - category/kong-gateway
  - category/middleware-integration
  - category/pos-modernization
  - category/n8n-automation
  - category/tech-experiments
