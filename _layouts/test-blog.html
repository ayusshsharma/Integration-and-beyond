---
layout: test-default
---
<main class="site-main" role="main">
  <div class="content-wrapper">
    <div class="content-area">
      <header class="section-header section-header--page">
        <h1 class="section-header__title">{{ page.title }}</h1>
      </header>
      <div class="posts-grid">
        {% for post in site.posts %}
          <article class="post-card">
            <div class="post-card__meta">
              {% if post.categories.first %}
                <a class="post-card__category" href="{{ post.categories.first | slugify | prepend: '/test/category/' | append: '/' | relative_url }}">
                  {{ post.categories.first }}
                </a>
              {% endif %}
              <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %d, %Y" }}</time>
            </div>
            <h2 class="post-card__title">
              <a href="{{ '/test/p/' | append: post.slug | append: '/' | relative_url }}">{{ post.title }}</a>
            </h2>
            <div class="post-card__excerpt">
              {{ post.excerpt }}
            </div>
            <a class="read-more" href="{{ '/test/p/' | append: post.slug | append: '/' | relative_url }}">Read more</a>
          </article>
        {% endfor %}
      </div>
    </div>
    {% include test/sidebar.html %}
  </div>
</main>
